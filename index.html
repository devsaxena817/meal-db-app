<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef's Choice | Simplest Recipes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <main class="app-container">
        <header>
            <h1>Chef's <span class="highlight">Choice</span></h1>
            <p>Find the meal with the fewest ingredients for a quick cook.</p>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="Search dish (e.g., Pasta, Beef)..." autocomplete="off">
                <button id="searchBtn">Optimize Recipe</button>
            </div>
        </section>

        <section id="status-container"></section>

        <section id="meal-result" class="meal-grid"></section>
    </main>
    <script src="script.js"></script>
</body>
</html>
